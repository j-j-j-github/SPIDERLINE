            justify-content: center;

    .bannerimage {
        width: 100%;
        height: 450px;
        object-fit: cover;
        object-position: bottom;
        filter: brightness(60%);
        z-index: 1;
      }

      .bannertext {
        color: white;
        position: absolute;
        top: 30%;

    }

      .cardsection {

        padding: 10px;
        background: white;
        position: relative;
        z-index: 2;
    }

      .card {
        margin-top: -80px;
        flex: 1;
        background: white;
        border-radius: 12px;
        padding: 20px 20px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

      button{
        background-color: #de1875;
        color: white;
        border-radius: 5px;
        border: none;
        box-shadow: none;
        appearance: none;
        padding: 10px 12px;
    }

      .card img {
        border-radius: 12px
    }

       footer {
        position: fixed;
        left: 0;
        bottom: 0;
        width: 100%;
        text-align: center;
        padding: 3px;
        background-color: #35adb8;
        color: white;
    }

</style>
