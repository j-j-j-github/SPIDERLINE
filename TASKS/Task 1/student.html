<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#1a1a1a;
    border-radius:12px;
    padding:25px;
}

h1{
    font-size:24px;
    margin-bottom:6px;
}

.subtitle{
    color:#aaa;
    font-size:14px;
    margin-bottom:25px;
}

.form-top{
    display:flex;
    gap:15px;
    margin-bottom:18px;
}

.form-group{
    flex:1;
}

label{
    display:block;
    margin-bottom:7px;
    font-size:14px;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    background:#262626;
    border:1px solid #333;
    border-radius:8px;
    color:white;
    font-size:14px;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:#666;
}

.subjects{
    margin-top:25px;
}

.subjects h2{
    font-size:18px;
    margin-bottom:15px;
}

.subject-row{
    display:flex;
    gap:12px;
    margin-bottom:12px;
}

.subject-row input{
    flex:1;
}

textarea{
    margin-top:20px;
    min-height:90px;
    resize:vertical;
}

.buttons{
    display:flex;
    gap:12px;
    margin-top:22px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
}

.submit-btn{
    background:white;
    color:black;
}

.reset-btn{
    background:#2a2a2a;
    color:white;
}

@media(max-width:600px){

    .form-top,
    .subject-row,
    .buttons{
        flex-direction:column;
    }

    .container{
        padding:18px;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>Student Marks Entry</h1>
    <p class="subtitle">Fill the student details and marks below</p>

    <form>

        <div class="form-top">

            <div class="form-group">
                <label>Student Name</label>
                <input type="text" placeholder="Enter name">
            </div>

            <div class="form-group">
                <label>Roll Number</label>
                <input type="text" placeholder="2024001">
            </div>

        </div>

        <div class="form-group">
            <label>Course</label>

            <select>
                <option>Select Course</option>
                <option>MCA</option>
                <option>MBA</option>
                <option>BCA</option>
                <option>BBA</option>
            </select>
        </div>

        <div class="subjects">

            <h2>Subject Marks</h2>

            <div class="subject-row">
                <input type="text" placeholder="Subject Name">
                <input type="number" placeholder="Marks">
            </div>

            <div class="subject-row">
                <input type="text" placeholder="Subject Name">
                <input type="number" placeholder="Marks">
            </div>

            <div class="subject-row">
                <input type="text" placeholder="Subject Name">
                <input type="number" placeholder="Marks">
            </div>

        </div>

        <textarea placeholder="Comments"></textarea>

        <div class="buttons">
            <button type="submit" class="submit-btn">Submit</button>
            <button type="reset" class="reset-btn">Reset</button>
        </div>

    </form>

</div>

</body>
</html>
